<style>
  :root{
    --bg:#f5f5f7;--surface:#fff;--border:#e5e5ea;
    --text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2;
    --blue:#007aff;--green:#34c759;--orange:#ff9500;--red:#ff3b30;
    --purple:#af52de;--teal:#5ac8fa;--indigo:#5856d6;--pink:#ff2d55;--mint:#00c7be;
    --r:14px;--r2:10px;
    --sh:0 1px 3px rgba(0,0,0,.06);
    --sh2:0 4px 16px rgba(0,0,0,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}

  /* NAV */
  nav{position:sticky;top:0;z-index:100;background:rgba(245,245,247,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:48px}
  .nb{display:flex;align-items:center;gap:10px}
  .nb b{font-size:13px;letter-spacing:.8px;font-weight:700}
  .nb span{font-size:12px;color:var(--text3)}
  .nw{display:flex;align-items:center;gap:5px}
  .nw button{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
  .nw button:hover{border-color:var(--blue);color:var(--blue)}
  .nw button.on{background:var(--blue);border-color:var(--blue);color:#fff}
  .nw .wk{font-size:13px;color:var(--text2);min-width:140px;text-align:center;font-weight:500;font-variant-numeric:tabular-nums}
  .nm{font-size:11px;color:var(--text3)}

  .page{max-width:1000px;margin:0 auto;padding:24px 32px 100px}

  /* SECTION */
  .s{margin-bottom:36px}
  .sh{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .sh h2{font-size:17px;font-weight:700;letter-spacing:-.2px}
  .sh .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .sh .sub{font-size:11px;color:var(--text3);margin-left:auto;font-weight:500}

  /* BANNER */
  .banner{background:linear-gradient(135deg,#e8f4fd,#f3e8ff);border-radius:var(--r);padding:18px 22px;font-size:14px;line-height:1.8}
  .banner b{color:var(--blue);font-weight:600}

  /* METRICS */
  .mx{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
  .mc{background:var(--surface);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);position:relative;overflow:hidden}
  .mc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
  .mc.b::before{background:var(--blue)} .mc.g::before{background:var(--green)} .mc.o::before{background:var(--orange)} .mc.p::before{background:var(--purple)}
  .mc .l{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:500}
  .mc .v{font-size:26px;font-weight:700;margin:2px 0;font-variant-numeric:tabular-nums}
  .mc .v.b{color:var(--blue)} .mc .v.g{color:var(--green)} .mc .v.o{color:var(--orange)} .mc .v.p{color:var(--purple)}
  .mc .d{font-size:11px;color:var(--text3)}

  /* KPI DASHBOARD */
  .kpi{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:14px}
  .kc{background:var(--surface);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
  .kc-head{display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:13px;font-weight:600}
  .kc-icon{font-size:16px}
  .kc-item{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;border-top:1px solid var(--border)}
  .kc-item:first-of-type{border-top:none}
  .kc-metric{font-size:11px;color:var(--text3)}
  .kc-val{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
  .kc-val.up{color:var(--green)} .kc-val.down{color:var(--red)} .kc-val.stable{color:var(--text2)}
  .kc-note{font-size:10px;color:var(--text3);margin-top:2px}
  .trend{font-size:10px;margin-left:3px}
  .trend.up::after{content:'↑'} .trend.down::after{content:'↓'} .trend.stable::after{content:'→'}

  /* LIFECYCLE LEGEND */
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);font-weight:500}
  .leg .ld{width:10px;height:10px;border-radius:3px}

  /* PROJECT CARD */
  .pl{display:flex;flex-direction:column;gap:8px}
  .pc{background:var(--surface);border-radius:var(--r);padding:16px 20px;box-shadow:var(--sh);transition:box-shadow .2s;display:grid;grid-template-columns:1fr auto;gap:0 16px}
  .pc:hover{box-shadow:var(--sh2)}
  .pc-top{grid-column:1/-1;display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .pc-name{font-size:14px;font-weight:600}
  .pc-owner{font-size:11px;color:var(--text3)}
  .tag{font-size:10px;padding:3px 10px;border-radius:10px;font-weight:600;letter-spacing:.2px;margin-left:auto;flex-shrink:0;white-space:nowrap}
  /* 生命周期颜色 */
  .tag-plan{background:#f2f2f7;color:var(--text2)} .tag-build{background:#fff4e0;color:var(--orange)}
  .tag-test{background:#e8f0ff;color:var(--blue)} .tag-live{background:#e8f8ee;color:var(--green)}
  .tag-iter{background:#f3e8ff;color:var(--purple)} .tag-done{background:#e8f8ee;color:var(--mint)}
  .tag-pause{background:#f2f2f7;color:var(--text3)}
  .pc ul{list-style:none;grid-column:1/-1}
  .pc li{font-size:13px;padding:3px 0 3px 16px;position:relative;line-height:1.7;list-style:none}
  .pc li::before{content:'';position:absolute;left:0;top:11px;width:5px;height:5px;border-radius:50%;background:var(--border)}
  .pc-next{grid-column:1/-1;font-size:12px;color:var(--text2);padding-top:8px;margin-top:6px;border-top:1px solid var(--border);display:flex;gap:6px}
  .pc-next::before{content:'→';color:var(--orange);font-weight:700;flex-shrink:0}

  /* DECISIONS */
  .dec{background:var(--surface);border-radius:var(--r);padding:18px 22px;box-shadow:var(--sh);border-left:3px solid var(--orange)}
  .dec h3{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .dec ul{list-style:none}
  .dec li{font-size:13px;padding:5px 0 5px 18px;position:relative;line-height:1.7}
  .dec li::before{content:'';position:absolute;left:2px;top:12px;width:8px;height:8px;border-radius:50%;border:2px solid var(--orange);background:transparent}

  /* REVIEW */
  .rv-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .rv{background:var(--surface);border-radius:var(--r);padding:18px 22px;box-shadow:var(--sh)}
  .rv h3{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .rv ul{list-style:none}
  .rv li{font-size:13px;padding:4px 0 4px 18px;position:relative;line-height:1.7}
  .rv.wins li::before{content:'✓';position:absolute;left:0;color:var(--green);font-weight:700;font-size:12px}
  .rv.issues li::before{content:'!';position:absolute;left:1px;color:var(--orange);font-weight:700;font-size:11px}
  .rv.lessons{grid-column:1/-1}
  .rv.lessons li::before{content:'▸';position:absolute;left:1px;color:var(--purple);font-weight:700}

  /* INSIGHT */
  .ins{background:var(--surface);border-radius:var(--r);padding:22px 26px;box-shadow:var(--sh);border:1px dashed var(--border)}
  .ins .qs{font-size:13px;color:var(--text2);line-height:1.85}
  .ins .qs em{color:var(--blue);font-style:normal;font-weight:600}
  .ins .ans{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);font-size:14px;line-height:1.85;white-space:pre-wrap}
  .ins .ans.empty{color:var(--text3);font-style:italic}

  /* RADAR */
  .rd{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
  .rc{background:var(--surface);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);transition:all .2s;border:1px solid transparent}
  .rc:hover{border-color:var(--teal);box-shadow:var(--sh2)}
  .rc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
  .rc-tag{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600}
  .rc-tag.tool{background:#e8f8f6;color:var(--teal)} .rc-tag.model{background:#f3e8ff;color:var(--purple)}
  .rc-tag.usecase{background:#e8f8ee;color:var(--green)} .rc-tag.trend{background:#fff4e0;color:var(--orange)}
  .rc-title{font-size:14px;font-weight:600;margin-bottom:4px}
  .rc-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:6px}
  .rc a{font-size:12px;color:var(--blue);text-decoration:none;font-weight:500}
  .rc a:hover{text-decoration:underline}
  .rc-rel{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--orange);line-height:1.6}

  /* HISTORY */
  .ht{display:flex;flex-direction:column;gap:5px}
  .hi{background:var(--surface);border-radius:var(--r2);padding:10px 16px;box-shadow:var(--sh);display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s;font-size:13px}
  .hi:hover{box-shadow:var(--sh2)} .hi.now{border-left:3px solid var(--blue)}
  .hi .wk{font-weight:600;min-width:72px;color:var(--text2);font-variant-numeric:tabular-nums;font-size:12px}
  .hi .dt{color:var(--text3);min-width:100px;font-size:11px}
  .hi .sm{color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hi .ar{color:var(--text3);font-size:11px}

  /* BIZ LABELS */
  .biz{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 12px;border-radius:8px;letter-spacing:.3px;margin-bottom:8px}
  .biz-b{background:#e8f0ff;color:var(--blue)} .biz-p{background:#f3e8ff;color:var(--purple)}
  .biz-t{background:#e8f8f6;color:var(--teal)} .biz-o{background:#fff4e0;color:var(--orange)}
  .biz-g{background:#e8f8ee;color:var(--green)} .biz-gray{background:#f2f2f7;color:var(--text2)}

  @media(max-width:768px){nav{padding:0 16px}.page{padding:16px}.mx{grid-template-columns:repeat(2,1fr)}.rv-row{grid-template-columns:1fr}.rv.lessons{grid-column:1}.pc{grid-template-columns:1fr}}
  @media print{nav{position:static}body{background:#fff}.mc,.pc,.rv,.rc,.hi,.dec{box-shadow:none;border:1px solid #eee}}
</style>
</head>
